stages:
  - check
  - deploy

variables:
  GIT_DEPTH: 1
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"

cache:
  key: "rust-${CI_COMMIT_REF_SLUG}"
  paths:
    - .cargo/registry
    - rust/target/

check-rust:
  stage: check
  image: rust:latest
  script:
    - cd rust
    - cargo check --release 2>&1
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - rust/**/*
    - if: $CI_COMMIT_TAG

deploy-website:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache openssh-client rsync
    - mkdir -p ~/.ssh
    - echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      echo "[ci] Syncing repository to server..."
      rsync -az --delete \
        --exclude='.git' \
        --exclude='rust/target' \
        --exclude='cloud/target' \
        --exclude='node_modules' \
        -e "ssh -i ~/.ssh/deploy_key" \
        ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/home/administrator/lean-ctx/"

      echo "[ci] Building and deploying website..."
      ssh -i ~/.ssh/deploy_key "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s "$DEPLOY_SUDO_PASSWORD" << 'DEPLOY'
        set -euo pipefail
        PASS="$1"
        cd /home/administrator/lean-ctx

        echo "[ci] Building lean-ctx-web Docker image..."
        echo "$PASS" | sudo -S docker build --no-cache -f Dockerfile.web -t lean-ctx-web . 2>&1 | tail -12

        echo "[ci] Restarting container..."
        echo "$PASS" | sudo -S docker stop lean-ctx-web 2>/dev/null || true
        echo "$PASS" | sudo -S docker rm lean-ctx-web 2>/dev/null || true

        echo "$PASS" | sudo -S docker run -d \
          --name lean-ctx-web \
          --network coolify \
          --restart unless-stopped \
          -l "traefik.enable=true" \
          -l "traefik.docker.network=coolify" \
          -l 'traefik.http.routers.lean-ctx.rule=Host(`leanctx.com`) || Host(`www.leanctx.com`) || Host(`lean-ctx.pounce.ch`) || Host(`leanctx.tech`) || Host(`www.leanctx.tech`)' \
          -l "traefik.http.routers.lean-ctx.entrypoints=https" \
          -l "traefik.http.routers.lean-ctx.tls=true" \
          -l "traefik.http.routers.lean-ctx.tls.certresolver=letsencrypt" \
          -l "traefik.http.services.lean-ctx.loadbalancer.server.port=80" \
          lean-ctx-web

        echo "[ci] lean-ctx-web deployed successfully"
      DEPLOY
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
