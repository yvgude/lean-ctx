stages:
  - deploy

deploy:
  stage: deploy
  tags:
    - pounce-runner
  script:
    - cd /home/administrator/lean-ctx
    - echo "$DEPLOY_SUDO_PASSWORD" | sudo -S docker compose -f docker-compose.web.yml build --no-cache
    - echo "$DEPLOY_SUDO_PASSWORD" | sudo -S docker compose -f docker-compose.web.yml up -d --force-recreate
  only:
    - main
