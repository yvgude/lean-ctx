services:
  api:
    build:
      context: ./cloud
      dockerfile: Dockerfile
    container_name: leanctx-api
    restart: unless-stopped
    environment:
      - PORT=3334
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID}
      - STRIPE_TEAM_PRICE_ID=${STRIPE_TEAM_PRICE_ID}
      - BASE_URL=https://api.leanctx.com
    volumes:
      - api-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.leanctx.com`)"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3334"
    networks:
      - web

  traefik:
    image: traefik:v3.3
    container_name: leanctx-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - web

volumes:
  api-data:
  traefik-certs:

networks:
  web:
    driver: bridge
