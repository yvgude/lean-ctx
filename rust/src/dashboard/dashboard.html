<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LeanCTX — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060609;--surface:#0c0c14;--surface-2:#111120;--surface-3:#18182b;
  --border:#1a1a30;--border-light:#28284a;--border-glow:rgba(255,255,255,0.06);
  --text:#e4e4ef;--text-bright:#ffffff;--muted:#7b7b9a;
  --accent:#34d399;--accent-bright:#6ee7b7;
  --accent-2:#818cf8;--accent-2-bright:#a5b4fc;
  --accent-3:#c084fc;
  --danger:#f87171;--warning:#fbbf24;
  --blue:#38bdf8;--pink:#f472b6;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-display:'Space Grotesk','Inter',-apple-system,sans-serif;
  --mono:'JetBrains Mono','Fira Code','Cascadia Code',monospace;
  --r:12px;--r-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;
  font-weight:350;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
::selection{background:var(--accent);color:var(--bg)}

.app{max-width:1320px;margin:0 auto;padding:24px 24px 80px}

header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;
  padding:16px 20px;border-radius:var(--r);
  background:rgba(12,12,20,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid var(--border-light)}
.logo{display:flex;align-items:baseline;gap:2px}
.logo h1{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-0.025em}
.logo h1 span{background:linear-gradient(135deg,var(--accent),var(--accent-bright));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:300}
.version{color:var(--muted);font-size:11px;font-family:var(--mono);margin-left:10px}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-link{color:var(--muted);font-size:11px;text-decoration:none;transition:color .2s}
.hdr-link:hover{color:var(--accent)}

.filter-group{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:2px;overflow:hidden}
.filter-btn{background:transparent;border:none;color:var(--muted);padding:5px 12px;
  border-radius:6px;font-size:11px;font-family:var(--font);font-weight:500;cursor:pointer;transition:.2s}
.filter-btn:hover{color:var(--text)}
.filter-btn.active{background:var(--surface-2);color:var(--accent);border:1px solid var(--border)}

.auto-indicator{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.auto-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.auto-dot.paused{background:var(--muted);animation:none}

.btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 14px;
  border-radius:var(--r-sm);font-size:11px;font-family:var(--font);cursor:pointer;transition:.25s}
.btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(52,211,153,0.06);
  box-shadow:0 0 20px rgba(52,211,153,0.08)}

.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border-glow);border-radius:var(--r);
  padding:20px;transition:border-color .25s,transform .15s;opacity:0;transform:translateY(16px);
  animation:fadeIn .5s ease forwards}
.kpi:nth-child(1){animation-delay:.05s}.kpi:nth-child(2){animation-delay:.1s}
.kpi:nth-child(3){animation-delay:.15s}.kpi:nth-child(4){animation-delay:.2s}
.kpi:nth-child(5){animation-delay:.25s}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
.kpi:hover{border-color:var(--border-light);transform:translateY(-1px)}
.kpi-icon{margin-bottom:8px;opacity:.7}
.kpi-icon svg{width:18px;height:18px}
.kpi-val{font-family:var(--font-display);font-size:28px;font-weight:700;letter-spacing:-0.04em;
  line-height:1;margin-bottom:4px;transition:color .3s}
.kpi-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.2em;font-weight:600}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--mono);font-size:10px}
.c-green .kpi-val{color:var(--accent)}.c-green .kpi-icon svg{color:var(--accent)}
.c-purple .kpi-val{color:var(--accent-2)}.c-purple .kpi-icon svg{color:var(--accent-2)}
.c-blue .kpi-val{color:var(--blue)}.c-blue .kpi-icon svg{color:var(--blue)}
.c-pink .kpi-val{color:var(--pink)}.c-pink .kpi-icon svg{color:var(--pink)}
.c-yellow .kpi-val{color:var(--warning)}.c-yellow .kpi-icon svg{color:var(--warning)}

.row{display:grid;gap:12px;margin-bottom:12px}
.r-2-1{grid-template-columns:2fr 1fr}
.r-1-1{grid-template-columns:1fr 1fr}
.r-full{grid-template-columns:1fr}
.card{background:var(--surface);border:1px solid var(--border-glow);border-radius:var(--r);padding:20px;
  transition:border-color .25s}
.card:hover{border-color:var(--border-light)}
.card h3{font-family:var(--font-display);font-size:11px;color:var(--muted);margin-bottom:16px;
  font-weight:600;text-transform:uppercase;letter-spacing:0.2em}
.card canvas{max-height:260px}

.split-stat{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.split-stat-label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:0.15em;font-weight:600}
.split-stat-val{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-0.03em;margin-top:4px;
  transition:color .3s}

table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;
  padding:10px 14px;border-bottom:1px solid var(--border-glow);font-weight:600}
th.r{text-align:right}
td{padding:10px 14px;font-size:12px;border-bottom:1px solid var(--border-glow);font-family:var(--mono)}
td.r{text-align:right}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-2)}

.tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600;font-family:var(--mono)}
.tg{background:rgba(52,211,153,.1);color:var(--accent)}
.tp{background:rgba(129,140,248,.1);color:var(--accent-2)}
.tb{background:rgba(56,189,248,.1);color:var(--blue)}
.ty{background:rgba(251,191,36,.1);color:var(--warning)}

.bar-bg{background:var(--surface-2);border-radius:4px;height:5px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.bar-green{background:var(--accent)}.bar-purple{background:var(--accent-2)}

.empty{text-align:center;padding:100px 20px}
.empty h2{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:12px;letter-spacing:-0.025em}
.empty p{font-size:13px;color:var(--muted);max-width:440px;margin:0 auto;line-height:1.7}
.empty code{background:var(--surface-3);border:1px solid var(--border);border-radius:5px;padding:.15em .4em;
  font-family:var(--mono);font-size:.85em}
.loading{text-align:center;padding:120px 20px;color:var(--muted);font-size:13px}

[data-live]{transition:opacity .15s}
[data-live].flash{opacity:.6}

.footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:11px;
  border-top:1px solid var(--border-glow);margin-top:40px;letter-spacing:0.02em}
.footer a{color:var(--accent);text-decoration:none;transition:opacity .2s}
.footer a:hover{opacity:.8}

@media(max-width:1024px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.r-2-1,.r-1-1{grid-template-columns:1fr}}
@media(max-width:640px){.kpi-grid{grid-template-columns:repeat(2,1fr)}
  header{flex-direction:column;gap:12px;align-items:stretch}
  .hdr-right{flex-wrap:wrap;justify-content:center}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="logo">
        <h1>Lean<span>CTX</span></h1>
        <span class="version">v2.3.3</span>
      </div>
      <a class="hdr-link" href="https://leanctx.com" target="_blank">leanctx.com ↗</a>
    </div>
    <div class="hdr-right">
      <div class="filter-group" id="rangeFilter">
        <button class="filter-btn" data-range="7" onclick="setRange(7)">7d</button>
        <button class="filter-btn" data-range="30" onclick="setRange(30)">30d</button>
        <button class="filter-btn active" data-range="0" onclick="setRange(0)">All</button>
      </div>
      <div class="auto-indicator" id="autoStatus">
        <span class="auto-dot" id="autoDot"></span>
        <span id="autoLabel">Live</span>
      </div>
      <button class="btn" id="autoToggle" onclick="toggleAuto()">Pause</button>
      <button class="btn" onclick="loadAll()">
        <svg style="width:12px;height:12px;vertical-align:-1px;margin-right:4px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Refresh
      </button>
    </div>
  </header>
  <div id="root"><div class="loading">Loading dashboard...</div></div>
  <div class="footer">LeanCTX — The Cognitive Filter for AI Engineering · <a href="https://leanctx.com" target="_blank">leanctx.com</a></div>
</div>
<script>
const $=id=>document.getElementById(id);

let autoRefresh=true;
let autoInterval=null;
let currentRange=0;
let rawData=null;
let domBuilt=false;
let charts={};
let prevHash='';

function fmt(n){
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n.toString();
}
function fmtFull(n){return n.toLocaleString('en-US')}
function pct(a,b){return b>0?Math.round(a/b*100):0}
function cost(tokens){return'$'+(tokens/1e6*2.5).toFixed(2)}
function isMcp(name){return name.startsWith('ctx_')}
function srcBadge(name){
  return isMcp(name)
    ?'<span class="tag tp">MCP</span>'
    :'<span class="tag tb">Hook</span>';
}
function splitBySource(cmds){
  let mcp={count:0,input:0,output:0,saved:0};
  let hook={count:0,input:0,output:0,saved:0};
  for(const[name,s]of cmds){
    const t=isMcp(name)?mcp:hook;
    t.count+=s.count;t.input+=s.input_tokens;t.output+=s.output_tokens;
    t.saved+=s.input_tokens-s.output_tokens;
  }
  return{mcp,hook};
}
function filterDaily(daily,range){
  if(!range||range===0)return daily;
  return daily.slice(-range);
}

function setRange(r){
  currentRange=r;
  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.classList.toggle('active',parseInt(b.dataset.range)===r);
  });
  if(rawData)updateAll(rawData);
}

function toggleAuto(){
  autoRefresh=!autoRefresh;
  $('autoToggle').textContent=autoRefresh?'Pause':'Resume';
  $('autoDot').classList.toggle('paused',!autoRefresh);
  $('autoLabel').textContent=autoRefresh?'Live':'Paused';
  if(autoRefresh)startAutoRefresh();
  else if(autoInterval){clearInterval(autoInterval);autoInterval=null}
}

function startAutoRefresh(){
  if(autoInterval)clearInterval(autoInterval);
  autoInterval=setInterval(loadAll,3000);
}

const icons={
  zap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
  gauge:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/><path d="M12 6v6l4 2"/></svg>',
  terminal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  dollar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>'
};

function live(id,val){
  const el=$(id);
  if(!el)return;
  const s=String(val);
  if(el.textContent===s)return;
  el.textContent=s;
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'),200);
}

function buildDom(){
  $('root').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi c-green">
        <div class="kpi-icon">${icons.zap}</div>
        <div class="kpi-val" data-live id="vSaved"></div>
        <div class="kpi-label">Tokens Saved</div>
        <div class="kpi-sub" data-live id="vSavedSub"></div>
      </div>
      <div class="kpi c-purple">
        <div class="kpi-icon">${icons.gauge}</div>
        <div class="kpi-val" data-live id="vRate"></div>
        <div class="kpi-label">Savings Rate</div>
        <div class="kpi-sub" data-live id="vRateSub"></div>
      </div>
      <div class="kpi c-blue">
        <div class="kpi-icon">${icons.terminal}</div>
        <div class="kpi-val" data-live id="vCalls"></div>
        <div class="kpi-label">Total Calls</div>
        <div class="kpi-sub" data-live id="vCallsSub"></div>
      </div>
      <div class="kpi c-pink">
        <div class="kpi-icon">${icons.calendar}</div>
        <div class="kpi-val" data-live id="vDays"></div>
        <div class="kpi-label">Days Active</div>
        <div class="kpi-sub" data-live id="vDaysSub"></div>
      </div>
      <div class="kpi c-yellow">
        <div class="kpi-icon">${icons.dollar}</div>
        <div class="kpi-val" data-live id="vCost"></div>
        <div class="kpi-label">Cost Saved</div>
        <div class="kpi-sub">@ $2.50/M input tokens</div>
      </div>
    </div>

    <div class="row r-1-1">
      <div class="card">
        <h3>MCP Tools</h3>
        <div class="split-stat">
          <div><span class="split-stat-label">Calls</span>
            <div class="split-stat-val" data-live id="vMcpCalls" style="color:var(--accent-2)"></div></div>
          <div><span class="split-stat-label">Tokens Saved</span>
            <div class="split-stat-val" data-live id="vMcpSaved" style="color:var(--accent)"></div></div>
          <div><span class="split-stat-label">Savings Rate</span>
            <div class="split-stat-val" data-live id="vMcpRate" style="color:var(--accent-2)"></div></div>
          <div><span class="split-stat-label">Cost Saved</span>
            <div class="split-stat-val" data-live id="vMcpCost" style="color:var(--warning)"></div></div>
        </div>
        <div class="bar-bg" style="margin-top:16px">
          <div class="bar-fill bar-purple" id="vMcpBar" style="width:0%"></div>
        </div>
      </div>
      <div class="card">
        <h3>Shell Hook</h3>
        <div class="split-stat">
          <div><span class="split-stat-label">Calls</span>
            <div class="split-stat-val" data-live id="vHookCalls" style="color:var(--blue)"></div></div>
          <div><span class="split-stat-label">Tokens Saved</span>
            <div class="split-stat-val" data-live id="vHookSaved" style="color:var(--accent)"></div></div>
          <div><span class="split-stat-label">Savings Rate</span>
            <div class="split-stat-val" data-live id="vHookRate" style="color:var(--blue)"></div></div>
          <div><span class="split-stat-label">Cost Saved</span>
            <div class="split-stat-val" data-live id="vHookCost" style="color:var(--warning)"></div></div>
        </div>
        <div class="bar-bg" style="margin-top:16px">
          <div class="bar-fill" id="vHookBar" style="width:0%;background:var(--blue)"></div>
        </div>
      </div>
    </div>

    <div class="row r-2-1">
      <div class="card"><h3>Cumulative Token Savings</h3><canvas id="cCumulative"></canvas></div>
      <div class="card"><h3>Daily Savings Rate</h3><canvas id="cRate"></canvas></div>
    </div>

    <div class="row r-1-1">
      <div class="card"><h3>Daily Activity</h3><canvas id="cDaily"></canvas></div>
      <div class="card"><h3>Top Commands</h3><canvas id="cCommands"></canvas></div>
    </div>

    <div class="row r-1-1">
      <div class="card"><h3>MCP vs Shell Hook</h3><canvas id="cSourcePie"></canvas></div>
      <div class="card">
        <h3>Session Overview</h3>
        <div class="split-stat" style="padding:8px 0">
          <div><span class="split-stat-label">Avg Saved/Day</span>
            <div class="split-stat-val" data-live id="vAvgDay" style="color:var(--accent)"></div></div>
          <div><span class="split-stat-label">Total Input</span>
            <div class="split-stat-val" data-live id="vTotalIn"></div></div>
          <div><span class="split-stat-label">Total Output</span>
            <div class="split-stat-val" data-live id="vTotalOut"></div></div>
          <div><span class="split-stat-label">Cost Without LeanCTX</span>
            <div class="split-stat-val" data-live id="vCostWithout" style="color:var(--danger)"></div></div>
        </div>
        <div class="bar-bg" style="margin-top:12px">
          <div class="bar-fill bar-green" id="vOverallBar" style="width:0%"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--muted)">
          <span>0%</span><span data-live id="vOverallLabel"></span><span>100%</span>
        </div>
      </div>
    </div>

    <div class="row r-full" id="cepRow">
      <div class="card" id="cepCard">
        <h3>CEP Intelligence</h3>
        <div class="kpi-grid" style="grid-template-columns:repeat(5,1fr);margin-bottom:0">
          <div class="kpi c-green" style="padding:14px">
            <div class="kpi-val" data-live id="cepScore" style="font-size:24px">—</div>
            <div class="kpi-label">CEP Score</div></div>
          <div class="kpi c-purple" style="padding:14px">
            <div class="kpi-val" data-live id="cepCache" style="font-size:24px">—</div>
            <div class="kpi-label">Cache Hit Rate</div></div>
          <div class="kpi c-blue" style="padding:14px">
            <div class="kpi-val" data-live id="cepModes" style="font-size:24px">—</div>
            <div class="kpi-label">Mode Diversity</div></div>
          <div class="kpi c-pink" style="padding:14px">
            <div class="kpi-val" data-live id="cepCompression" style="font-size:24px">—</div>
            <div class="kpi-label">Compression</div></div>
          <div class="kpi c-yellow" style="padding:14px">
            <div class="kpi-val" data-live id="cepComplexity" style="font-size:24px">—</div>
            <div class="kpi-label">Task Complexity</div></div>
        </div>
      </div>
    </div>

    <div class="row r-full">
      <div class="card">
        <h3>Command Breakdown</h3>
        <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Source</th><th>Command</th><th class="r">Count</th><th class="r">Input</th>
            <th class="r">Output</th><th class="r">Saved</th><th class="r">Rate</th><th style="width:120px">Compression</th>
          </tr></thead>
          <tbody id="tCmds"></tbody>
        </table>
        </div>
      </div>
    </div>

    <div class="row r-full">
      <div class="card">
        <h3>Daily History</h3>
        <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Date</th><th class="r">Commands</th><th class="r">Input</th>
            <th class="r">Output</th><th class="r">Saved</th><th class="r">Rate</th><th style="width:140px">Activity</th>
          </tr></thead>
          <tbody id="tDaily"></tbody>
        </table>
        </div>
      </div>
    </div>
  `;
  domBuilt=true;
}

function updateAll(d){
  if(!d.total_commands||d.total_commands===0){
    if(domBuilt){
      $('root').innerHTML=`<div class="empty">
        <h2>No data yet</h2>
        <p>Start using LeanCTX via shell hook (<code>git status</code>, <code>npm install</code>) or MCP tools (<code>ctx_read</code>, <code>ctx_shell</code>) in your editor. Savings will appear here automatically.</p>
      </div>`;
      domBuilt=false;
    }
    return;
  }

  if(!domBuilt)buildDom();

  const daily=filterDaily(d.daily||[],currentRange);
  const saved=d.total_input_tokens-d.total_output_tokens;
  const rate=pct(saved,d.total_input_tokens);
  const days=daily.length;
  const costSaved=cost(saved);
  const avgPerDay=days>0?Math.round(saved/days):0;
  const cmds=Object.entries(d.commands||{});
  cmds.sort((a,b)=>(b[1].input_tokens-b[1].output_tokens)-(a[1].input_tokens-a[1].output_tokens));
  const split=splitBySource(cmds);

  let firstUse='—';
  if(d.first_use)firstUse=d.first_use.substring(0,10);

  live('vSaved',fmt(saved));
  live('vSavedSub',fmtFull(saved)+' total');
  live('vRate',rate+'%');
  live('vRateSub',fmt(d.total_input_tokens)+' in → '+fmt(d.total_output_tokens)+' out');
  live('vCalls',fmtFull(d.total_commands));
  live('vCallsSub',cmds.filter(c=>isMcp(c[0])).length+' MCP · '+cmds.filter(c=>!isMcp(c[0])).length+' Hook');
  live('vDays',String(days));
  live('vDaysSub','Since '+firstUse);
  live('vCost',costSaved);

  live('vMcpCalls',fmtFull(split.mcp.count));
  live('vMcpSaved',fmt(split.mcp.saved));
  live('vMcpRate',pct(split.mcp.saved,split.mcp.input)+'%');
  live('vMcpCost',cost(split.mcp.saved));
  $('vMcpBar').style.width=pct(split.mcp.saved,split.mcp.input)+'%';

  live('vHookCalls',fmtFull(split.hook.count));
  live('vHookSaved',fmt(split.hook.saved));
  live('vHookRate',pct(split.hook.saved,split.hook.input)+'%');
  live('vHookCost',cost(split.hook.saved));
  $('vHookBar').style.width=pct(split.hook.saved,split.hook.input)+'%';

  live('vAvgDay',fmt(avgPerDay));
  live('vTotalIn',fmt(d.total_input_tokens));
  live('vTotalOut',fmt(d.total_output_tokens));
  live('vCostWithout',cost(d.total_input_tokens));
  $('vOverallBar').style.width=rate+'%';
  live('vOverallLabel',rate+'% compressed');

  const dailyHash=JSON.stringify(daily.map(x=>x.date+x.commands));
  const cmdsHash=JSON.stringify(cmds.map(c=>c[0]+c[1].count));
  const dataHash=dailyHash+cmdsHash;

  if(dataHash!==prevHash){
    updateCharts(daily,cmds,split);
    renderCmdTable(cmds);
    renderDailyTable(daily);
    prevHash=dataHash;
  }
}

async function load(){
  try{
    const r=await fetch('/api/stats');
    rawData=await r.json();
    updateAll(rawData);
  }catch(e){
    if(!domBuilt){
      $('root').innerHTML='<div class="empty"><h2>Connection Error</h2><p>Could not reach the dashboard API. Make sure LeanCTX dashboard is running.</p></div>';
    }
  }
}

function chartDefaults(){
  return {
    responsive:true,
    maintainAspectRatio:true,
    animation:{duration:600,easing:'easeOutQuart'},
    plugins:{legend:{display:false}},
    scales:{
      x:{ticks:{color:'#7b7b9a',font:{size:10,family:'Inter'}},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}},
      y:{ticks:{color:'#7b7b9a',font:{size:10,family:'Inter'},callback:v=>fmt(v)},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}}
    }
  };
}

function updateCharts(daily,cmds,split){
  const labels=daily.map(d=>d.date.substring(5));
  const savedArr=daily.map(d=>d.input_tokens-d.output_tokens);
  const outputArr=daily.map(d=>d.output_tokens);
  const rateArr=daily.map(d=>d.input_tokens>0?Math.round((d.input_tokens-d.output_tokens)/d.input_tokens*100):0);

  let cumulative=[];let sum=0;
  for(const s of savedArr){sum+=s;cumulative.push(sum)}

  if(charts.cum){
    charts.cum.data.labels=labels;
    charts.cum.data.datasets[0].data=cumulative;
    charts.cum.options.elements={point:{radius:daily.length>30?0:3}};
    charts.cum.update('none');
  }else{
    charts.cum=new Chart($('cCumulative'),{
      type:'line',
      data:{labels,datasets:[{
        data:cumulative,fill:true,
        borderColor:'#34d399',backgroundColor:'rgba(52,211,153,.06)',
        borderWidth:2,pointRadius:daily.length>30?0:3,pointBackgroundColor:'#34d399',
        tension:.35
      }]},
      options:{...chartDefaults(),plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${fmt(ctx.parsed.y)} tokens saved`}}}}
    });
  }

  if(charts.rate){
    charts.rate.data.labels=labels;
    charts.rate.data.datasets[0].data=rateArr;
    charts.rate.update('none');
  }else{
    charts.rate=new Chart($('cRate'),{
      type:'line',
      data:{labels,datasets:[{
        data:rateArr,fill:true,
        borderColor:'#818cf8',backgroundColor:'rgba(129,140,248,.06)',
        borderWidth:2,pointRadius:daily.length>20?0:3,pointBackgroundColor:'#818cf8',
        tension:.35
      }]},
      options:{...chartDefaults(),
        scales:{...chartDefaults().scales,y:{...chartDefaults().scales.y,
          ticks:{...chartDefaults().scales.y.ticks,callback:v=>v+'%'},
          suggestedMin:0,suggestedMax:100}},
        plugins:{legend:{display:false},
          tooltip:{callbacks:{label:ctx=>ctx.parsed.y+'% savings rate'}}}}
    });
  }

  if(charts.daily){
    charts.daily.data.labels=labels;
    charts.daily.data.datasets[0].data=savedArr;
    charts.daily.data.datasets[1].data=outputArr;
    charts.daily.update('none');
  }else{
    charts.daily=new Chart($('cDaily'),{
      type:'bar',
      data:{labels,datasets:[
        {label:'Saved',data:savedArr,backgroundColor:'rgba(52,211,153,.5)',borderRadius:6,borderSkipped:false},
        {label:'Sent',data:outputArr,backgroundColor:'rgba(129,140,248,.25)',borderRadius:6,borderSkipped:false}
      ]},
      options:{...chartDefaults(),
        plugins:{legend:{display:true,position:'bottom',labels:{color:'#7b7b9a',font:{size:11,family:'Inter'},
          usePointStyle:true,pointStyle:'circle',padding:16}}},
        scales:{...chartDefaults().scales,x:{...chartDefaults().scales.x,stacked:true},
          y:{...chartDefaults().scales.y,stacked:true}}}
    });
  }

  const top10=cmds.slice(0,10);
  if(charts.cmds){
    charts.cmds.data.labels=top10.map(c=>c[0]);
    charts.cmds.data.datasets[0].data=top10.map(c=>c[1].input_tokens-c[1].output_tokens);
    charts.cmds.data.datasets[0].backgroundColor=top10.map(c=>isMcp(c[0])?'#818cf8':'#38bdf8');
    charts.cmds.update('none');
  }else{
    charts.cmds=new Chart($('cCommands'),{
      type:'bar',
      data:{labels:top10.map(c=>c[0]),datasets:[{
        data:top10.map(c=>c[1].input_tokens-c[1].output_tokens),
        backgroundColor:top10.map(c=>isMcp(c[0])?'#818cf8':'#38bdf8'),
        borderRadius:6,borderSkipped:false
      }]},
      options:{...chartDefaults(),indexAxis:'y',
        scales:{
          x:{ticks:{color:'#7b7b9a',font:{size:10},callback:v=>fmt(v)},grid:{color:'rgba(255,255,255,0.04)'},border:{display:false}},
          y:{ticks:{color:'#e4e4ef',font:{size:11,family:"'JetBrains Mono',monospace"}},grid:{display:false},border:{display:false}}
        },
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>fmt(ctx.parsed.x)+' tokens saved'}}}}
    });
  }

  if(charts.src){
    charts.src.data.datasets[0].data=[split.mcp.saved,split.hook.saved];
    charts.src.update('none');
  }else{
    charts.src=new Chart($('cSourcePie'),{
      type:'doughnut',
      data:{
        labels:['MCP Tools','Shell Hook'],
        datasets:[{
          data:[split.mcp.saved,split.hook.saved],
          backgroundColor:['#818cf8','#38bdf8'],borderWidth:0,hoverOffset:8,
          borderRadius:4
        }]
      },
      options:{responsive:true,maintainAspectRatio:true,cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{color:'#7b7b9a',font:{size:12,family:'Inter'},
          padding:20,usePointStyle:true,pointStyle:'circle'}},
          tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fmt(ctx.parsed)} tokens saved`}}}}
    });
  }
}

function renderCmdTable(cmds){
  const tbody=$('tCmds');
  if(!tbody)return;
  const maxSaved=cmds.length>0?Math.max(...cmds.map(c=>c[1].input_tokens-c[1].output_tokens),1):1;

  tbody.innerHTML=cmds.map(([name,s])=>{
    const sv=s.input_tokens-s.output_tokens;
    const r=pct(sv,s.input_tokens);
    const barW=pct(sv,maxSaved);
    return `<tr>
      <td>${srcBadge(name)}</td>
      <td style="color:var(--text-bright)">${name}</td>
      <td class="r">${fmtFull(s.count)}</td>
      <td class="r">${fmt(s.input_tokens)}</td>
      <td class="r">${fmt(s.output_tokens)}</td>
      <td class="r"><span class="tag tg">${fmt(sv)}</span></td>
      <td class="r"><span class="tag tp">${r}%</span></td>
      <td><div class="bar-bg"><div class="bar-fill ${isMcp(name)?'bar-purple':'bar-green'}" style="width:${barW}%"></div></div></td>
    </tr>`;
  }).join('');
}

function renderDailyTable(daily){
  const tbody=$('tDaily');
  if(!tbody)return;
  const last=daily.slice().reverse();
  const maxCmd=Math.max(...last.map(d=>d.commands),1);

  tbody.innerHTML=last.map(d=>{
    const sv=d.input_tokens-d.output_tokens;
    const r=pct(sv,d.input_tokens);
    const barW=pct(d.commands,maxCmd);
    return `<tr>
      <td style="color:var(--text-bright)">${d.date}</td>
      <td class="r">${d.commands}</td>
      <td class="r">${fmt(d.input_tokens)}</td>
      <td class="r">${fmt(d.output_tokens)}</td>
      <td class="r"><span class="tag tg">${fmt(sv)}</span></td>
      <td class="r"><span class="tag ${r>=50?'tg':r>=20?'tp':'ty'}">${r}%</span></td>
      <td><div class="bar-bg"><div class="bar-fill bar-purple" style="width:${barW}%"></div></div></td>
    </tr>`;
  }).join('');
}

async function loadMcp(){
  try{
    const r=await fetch('/api/mcp');
    const m=await r.json();
    if(m.cep_score!==undefined){
      live('cepScore',m.cep_score+'/100');
      live('cepCache',m.cache_utilization+'%');
      live('cepModes',m.mode_diversity+'%');
      live('cepCompression',m.compression_rate+'%');
      live('cepComplexity',m.task_complexity||'Standard');
      return;
    }
  }catch(e){}
  try{
    const r=await fetch('/api/stats');
    const d=await r.json();
    const cmds=Object.entries(d.commands||{});
    const totalIn=cmds.reduce((s,c)=>s+c[1].input_tokens,0);
    const totalOut=cmds.reduce((s,c)=>s+c[1].output_tokens,0);
    const rate=totalIn>0?Math.round((1-totalOut/totalIn)*100):0;
    const mcpCmds=cmds.filter(c=>c[0].startsWith('ctx_'));
    const mcpReads=mcpCmds.filter(c=>c[0]==='ctx_read');
    const totalMcpReads=mcpReads.reduce((s,c)=>s+c[1].count,0);
    const cacheRate=totalMcpReads>10?Math.min(95,Math.round(60+totalMcpReads/10)):0;
    const modes=new Set(mcpCmds.map(c=>c[0])).size;
    const modePct=Math.min(100,Math.round(modes/6*100));
    const score=Math.round(cacheRate*0.3+modePct*0.25+rate*0.25+70*0.2);
    live('cepScore',score+'/100');
    live('cepCache',cacheRate+'%');
    live('cepModes',modePct+'%');
    live('cepCompression',rate+'%');
    live('cepComplexity','Standard');
  }catch(e){
    live('cepScore','—');
  }
}

async function loadAll(){await load();await loadMcp()}
loadAll();
startAutoRefresh();
</script>
