server {
    listen 80;
    server_name leanctx.tech www.leanctx.tech www.leanctx.com lean-ctx.pounce.ch;
    return 301 https://leanctx.com$request_uri;
}

server {
    listen 80;
    server_name leanctx.com _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location = /install.sh {
        return 302 https://raw.githubusercontent.com/yvgude/lean-ctx/main/install.sh;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    location ~* \.(js|css|svg|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    error_page 404 /404.html;
}
